<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qwen 3.5 0.8B Browser Chat</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e232d;
      --text: #edf2f7;
      --muted: #aab4c3;
      --border: #2a3140;
      --accent: #1f8f8a;
      --accent-2: #166964;
      --user: #203447;
      --assistant: #1d2a24;
      --system: #222836;
      --error: #6c2230;
      --ok: #1c7c54;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 14px;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      align-items: center;
    }

    .title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .title p {
      margin: 6px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .status {
      text-align: right;
      font-size: 13px;
      color: var(--muted);
    }

    .downloads {
      padding: 14px 18px;
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #49b5ae);
      transition: width 160ms ease;
    }

    .chat {
      padding: 16px;
      overflow-y: auto;
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      margin-left: auto;
      background: var(--user);
    }

    .assistant {
      background: var(--assistant);
    }

    .system {
      max-width: 100%;
      background: var(--system);
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      max-width: 100%;
      background: var(--error);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    button {
      min-height: 56px;
      padding: 0 18px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-2);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .controls {
      padding: 0 4px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .secondary {
      min-height: 40px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0 12px;
    }

    .secondary:hover {
      background: var(--panel-2);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
    }

    @media (max-width: 680px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .status {
        text-align: left;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel topbar">
      <div class="title">
        <h1>Qwen 3.5 0.8B Browser Chat</h1>
        <p>Runs locally in your browser with WebGPU.</p>
      </div>
      <div id="status" class="status">Starting…</div>
    </div>

    <div class="panel downloads">
      <div class="row">
        <span id="progressLabel">Waiting to initialize</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-wrap" aria-label="Model loading progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="row">
        <span id="meta">Model: onnx-community/Qwen3.5-0.8B-ONNX</span>
        <span id="netHint">Open DevTools → Network to confirm asset downloads</span>
      </div>
    </div>

    <div id="chat" class="panel chat"></div>

    <div class="panel composer">
      <textarea id="input" placeholder="Type a message…" disabled></textarea>
      <button id="send" disabled>Send</button>
    </div>

    <div class="controls">
      <div>
        <button id="reset" class="secondary" disabled>Reset chat</button>
      </div>
      <div class="pill">
        <span class="dot"></span>
        <span id="mode">WebGPU local mode</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@latest";

    env.allowLocalModels = false;

    const MODEL = "onnx-community/Qwen3.5-0.8B-ONNX";

    const el = {
      chat: document.getElementById("chat"),
      input: document.getElementById("input"),
      send: document.getElementById("send"),
      reset: document.getElementById("reset"),
      status: document.getElementById("status"),
      meta: document.getElementById("meta"),
      mode: document.getElementById("mode"),
      progressLabel: document.getElementById("progressLabel"),
      progressText: document.getElementById("progressText"),
      progressBar: document.getElementById("progressBar"),
    };

    let generator = null;
    let loading = false;
    let generating = false;
    let progressState = {
      loaded: 0,
      total: 0,
      fileProgress: new Map(),
    };

    let messages = [
      { role: "system", content: "You are a concise, helpful assistant." }
    ];

    function addMessage(role, text, className = "") {
      const div = document.createElement("div");
      div.className = `msg ${role} ${className}`.trim();
      div.textContent = text;
      el.chat.appendChild(div);
      el.chat.scrollTop = el.chat.scrollHeight;
      return div;
    }

    function setReady(ready) {
      el.input.disabled = !ready;
      el.send.disabled = !ready;
      el.reset.disabled = !ready;
    }

    function setStatus(text) {
      el.status.textContent = text;
    }

    function updateProgressUI(loaded, total, label = "Downloading model files…") {
      const pct = total > 0 ? Math.max(0, Math.min(100, (loaded / total) * 100)) : 0;
      el.progressBar.style.width = `${pct}%`;
      el.progressText.textContent = total > 0
        ? `${pct.toFixed(1)}% · ${formatBytes(loaded)} / ${formatBytes(total)}`
        : `${formatBytes(loaded)} downloaded`;
      el.progressLabel.textContent = label;
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let i = 0;
      let val = bytes;
      while (val >= 1024 && i < units.length - 1) {
        val /= 1024;
        i++;
      }
      return `${val.toFixed(val >= 100 ? 0 : val >= 10 ? 1 : 2)} ${units[i]}`;
    }

    function consumeProgress(evt) {
      if (!evt) return;

      if (evt.status === "progress_total" && Number.isFinite(evt.total)) {
        progressState.total = evt.total;
        updateProgressUI(progressState.loaded, progressState.total, "Preparing download…");
        return;
      }

      if (evt.status === "progress") {
        const key = evt.file ?? evt.name ?? Math.random().toString(36);
        const loaded = Number.isFinite(evt.loaded) ? evt.loaded : 0;
        const total = Number.isFinite(evt.total) ? evt.total : 0;

        progressState.fileProgress.set(key, { loaded, total });

        let aggLoaded = 0;
        let aggTotal = 0;
        for (const entry of progressState.fileProgress.values()) {
          aggLoaded += entry.loaded || 0;
          aggTotal += entry.total || 0;
        }

        progressState.loaded = aggLoaded;
        if (aggTotal > 0) progressState.total = aggTotal;

        updateProgressUI(
          progressState.loaded,
          progressState.total,
          evt.file ? `Downloading ${evt.file}` : "Downloading model files…"
        );
        return;
      }

      if (typeof evt.status === "string") {
        el.progressLabel.textContent = evt.status;
      }
    }

    async function hasWebGPU() {
      return !!navigator.gpu;
    }

    async function loadModel() {
      if (loading) return;
      loading = true;

      addMessage("system", "Initializing browser-local Qwen model…");

      if (!(await hasWebGPU())) {
        addMessage("error", "WebGPU is not available in this browser.");
        addMessage("system", "Use a current Chrome or Edge build with WebGPU enabled.");
        setStatus("WebGPU unavailable");
        el.progressLabel.textContent = "WebGPU unavailable";
        loading = false;
        return;
      }

      try {
        setStatus("Loading model…");
        el.progressLabel.textContent = "Starting model load…";
        el.progressText.textContent = "0%";
        el.meta.textContent = `Model: ${MODEL}`;
        el.mode.textContent = "WebGPU local mode";

        generator = await pipeline("text-generation", MODEL, {
          device: "webgpu",
          dtype: "q4",
          progress_callback: consumeProgress,
        });

        setReady(true);
        setStatus("Ready");
        updateProgressUI(progressState.total || progressState.loaded, progressState.total || progressState.loaded, "Model ready");
        addMessage("system", "Model loaded. Ask a question to begin.");
        el.input.focus();
      } catch (err) {
        console.error(err);
        addMessage("error", String(err?.message || err), "error");
        addMessage("system", "If this still fails, hard refresh once and watch DevTools → Network for model asset requests.");
        setStatus("Load failed");
        el.progressLabel.textContent = "Load failed";
      } finally {
        loading = false;
      }
    }

    async function chat() {
      if (!generator || generating) return;

      const text = el.input.value.trim();
      if (!text) return;

      generating = true;
      setReady(false);

      addMessage("user", text);
      messages.push({ role: "user", content: text });
      el.input.value = "";

      const live = addMessage("assistant", "Thinking…");
      setStatus("Generating…");

      try {
        const output = await generator(messages, {
          max_new_tokens: 192,
          temperature: 0.7,
          top_p: 0.9,
          do_sample: true,
          return_full_text: false,
        });

        let reply = "";
        const first = output?.[0];

        if (Array.isArray(first?.generated_text)) {
          reply = first.generated_text.at(-1)?.content || "";
        } else if (typeof first?.generated_text === "string") {
          reply = first.generated_text;
        }

        reply = reply.trim() || "(No output)";
        live.textContent = reply;
        messages.push({ role: "assistant", content: reply });
        setStatus("Ready");
      } catch (err) {
        console.error(err);
        live.className = "msg error";
        live.textContent = String(err?.message || err);
        setStatus("Generation failed");
      } finally {
        generating = false;
        setReady(true);
        el.input.focus();
      }
    }

    el.send.addEventListener("click", chat);

    el.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        chat();
      }
    });

    el.reset.addEventListener("click", () => {
      messages = [
        { role: "system", content: "You are a concise, helpful assistant." }
      ];
      el.chat.innerHTML = "";
      addMessage("system", "Chat reset.");
      el.input.focus();
    });

    loadModel();
  </script>
</body>
</html>
