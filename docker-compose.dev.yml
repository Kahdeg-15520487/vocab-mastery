# Development-only services (database and admin tools)
# Frontend and backend run locally with hot reload

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vocab_master
      POSTGRES_USER: vocab_user
      POSTGRES_PASSWORD: vocab_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocab_user -d vocab_master"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vocab-network

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - vocab-network

volumes:
  postgres-data:

networks:
  vocab-network:
    driver: bridge
